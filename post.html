<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Matéria - Diário Lunar</title>
</head>

<body style="font-family: Arial; max-width:800px; margin:auto; padding:30px; background:#F8F6F1;">

<h1 id="titulo"></h1>
<p id="categoria" style="color:#6D28D9;"></p>
<img id="imagem" style="width:100%; border-radius:15px;">
<p id="conteudo"></p>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAHtrL1LEtpnKZ9QdGl2ehveCOZLWM94VE",
  authDomain: "diario-lunar-dee91.firebaseapp.com",
  projectId: "diario-lunar-dee91",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const urlParams = new URLSearchParams(window.location.search);
const id = urlParams.get("id");

async function carregarPost() {
  const docRef = doc(db, "posts", id);
  const docSnap = await getDoc(docRef);

  if (docSnap.exists()) {
    const post = docSnap.data();

    document.getElementById("titulo").innerText = post.titulo;
    document.getElementById("categoria").innerText = post.categoria;
    document.getElementById("imagem").src = post.imagem;
    document.getElementById("conteudo").innerText = post.conteudo;
  } else {
    document.body.innerHTML = "Matéria não encontrada";
  }
}

carregarPost();
</script>

</body>
</html>
