<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Categoria - Diário Lunar</title>

<style>
body {
  font-family: Arial;
  background: #F8F6F1;
  margin: 0;
}

.container {
  padding: 40px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px,1fr));
  gap: 20px;
}

.card {
  background: white;
  border-radius: 15px;
  overflow: hidden;
  cursor: pointer;
}

.card img {
  width: 100%;
  height: 180px;
  object-fit: cover;
}

.card-content {
  padding: 15px;
}
</style>
</head>

<body>

<div class="container">
  <h1 id="titulo"></h1>
  <div class="grid" id="posts"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAHtrL1LEtpnKZ9QdGl2ehveCOZLWM94VE",
  authDomain: "diario-lunar-dee91.firebaseapp.com",
  projectId: "diario-lunar-dee91"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const tipo = new URLSearchParams(window.location.search).get("tipo");

document.getElementById("titulo").innerText = tipo;

async function carregar() {
  const snap = await getDocs(collection(db, "posts"));
  const container = document.getElementById("posts");

  snap.forEach(doc => {
    const post = doc.data();

    if (post.categoria === tipo) {
      const div = document.createElement("div");
      div.className = "card";

      div.onclick = () => {
        window.location.href = `/post.html?id=${doc.id}`;
      };

      div.innerHTML = `
        <img src="${post.imagem}">
        <div class="card-content">
          <h3>${post.titulo}</h3>
        </div>
      `;

      container.appendChild(div);
    }
  });
}

carregar();
</script>

</body>
</html>
