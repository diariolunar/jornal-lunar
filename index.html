<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Diário Lunar</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #F8F6F1;
}

.container {
  max-width: 1100px;
  margin: auto;
  padding: 20px;
}

/* DESTAQUE */
.hero {
  background: white;
  border-radius: 20px;
  overflow: hidden;
  margin-bottom: 30px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.08);
}

.hero img {
  width: 100%;
  height: 300px;
  object-fit: cover;
}

.hero-content {
  padding: 20px;
}

/* CARDS */
.grid {
  display: grid;
  grid-template-columns: repeat(3,1fr);
  gap: 20px;
}

.card {
  background: white;
  border-radius: 16px;
  overflow: hidden;
  box-shadow: 0 8px 20px rgba(0,0,0,0.06);
}

.card img {
  width: 100%;
  height: 150px;
  object-fit: cover;
}

.card-content {
  padding: 15px;
}

.card-content h3 {
  margin: 10px 0;
}

small {
  color: #6D28D9;
  font-weight: bold;
}
</style>
</head>

<body>

<div class="container">

  <!-- DESTAQUE -->
  <div id="hero" class="hero"></div>

  <!-- LISTA -->
  <div id="lista" class="grid"></div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import {
  getFirestore,
  collection,
  getDocs,
  query,
  orderBy
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

const app = initializeApp({
  apiKey: "AIzaSyAHtrL1LEtpnKZ9QdGl2ehveCOZLWM94VE",
  authDomain: "diario-lunar-dee91.firebaseapp.com",
  projectId: "diario-lunar-dee91"
});

const db = getFirestore(app);

function limparTexto(html) {
  let texto = html || "";

  texto = texto
    .replace(/<\/p>/gi, "\n")
    .replace(/<br\s*\/?>/gi, "\n");

  texto = texto.replace(/<[^>]*>/g, "");

  texto = texto.replace(/\n\s*\n/g, "\n");

  return texto.trim();
}

const q = query(collection(db, "posts"), orderBy("data", "desc"));
const snap = await getDocs(q);

const hero = document.getElementById("hero");
const lista = document.getElementById("lista");

let primeiro = true;

snap.forEach(doc => {
  const post = doc.data();
  const textoLimpo = limparTexto(post.conteudo);

  if (primeiro) {
    hero.innerHTML = `
      <img src="${post.imagem}">
      <div class="hero-content">
        <small>${post.categoria || ""}</small>
        <h2>${post.titulo}</h2>
        <p>${textoLimpo.substring(0,160)}...</p>
      </div>
    `;
    primeiro = false;
  } else {
    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <img src="${post.imagem}">
      <div class="card-content">
        <small>${post.categoria || ""}</small>
        <h3>${post.titulo}</h3>
        <p>${textoLimpo.substring(0,120)}...</p>
      </div>
    `;

    lista.appendChild(div);
  }
});
</script>

</body>
</html>
