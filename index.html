<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
  import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";
  import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAHtrL1LEtpnKZ9QdGl2ehveCOZLWM94VE",
    authDomain: "diario-lunar-dee91.firebaseapp.com",
    projectId: "diario-lunar-dee91",
    storageBucket: "diario-lunar-dee91.firebasestorage.app",
    messagingSenderId: "817640390152",
    appId: "1:817640390152:web:89e4b6a032b2124a6f1bbd",
    measurementId: "G-CQV35CD7QV"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);
  const provider = new GoogleAuthProvider();

  window.loginGoogle = function () {
    signInWithPopup(auth, provider);
  };

  onAuthStateChanged(auth, async (user) => {
    if (user) {
      console.log("Usuário logado:", user.email);

      // salva no banco
      await setDoc(doc(db, "users", user.uid), {
        email: user.email,
        name: user.displayName,
        isAdmin: true
      });

      alert("Você é ADM agora 🔥");
    }
  });
</script>
