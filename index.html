<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Diário Lunar</title>
</head>

<body style="font-family: Arial; max-width:1100px; margin:auto; padding:20px;">

<h1 style="color:#3B0764;">Diário Lunar</h1>

<button onclick="loginGoogle()" style="margin-bottom:20px; padding:10px 20px; background:#6B21A8; color:white; border:none; border-radius:10px;">
  Entrar
</button>

<h2 style="color:#3B0764;">Últimas matérias</h2>

<div id="lista" style="display:grid; grid-template-columns:repeat(auto-fit, minmax(280px,1fr)); gap:20px;"></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
  import { getAuth, signInWithPopup, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";
  import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAHtrL1LEtpnKZ9QdGl2ehveCOZLWM94VE",
    authDomain: "diario-lunar-dee91.firebaseapp.com",
    projectId: "diario-lunar-dee91",
    storageBucket: "diario-lunar-dee91.firebasestorage.app",
    messagingSenderId: "817640390152",
    appId: "1:817640390152:web:89e4b6a032b2124a6f1bbd"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);
  const provider = new GoogleAuthProvider();

  window.loginGoogle = function () {
    signInWithPopup(auth, provider);
  };

  async function carregarPosts() {
    const querySnapshot = await getDocs(collection(db, "posts"));
    const lista = document.getElementById("lista");

    lista.innerHTML = "";

    querySnapshot.forEach((doc) => {
      const post = doc.data();

      const div = document.createElement("div");
      div.style.border = "1px solid #ddd";
      div.style.borderRadius = "15px";
      div.style.overflow = "hidden";
      div.style.background = "white";

      div.innerHTML = `
        <img src="${post.imagem}" style="width:100%; height:180px; object-fit:cover;">
        <div style="padding:15px;">
          <small style="color:#6B21A8;">${post.categoria}</small>
          <h3 style="margin:10px 0;">${post.titulo}</h3>
          <p>${post.conteudo.substring(0, 120)}...</p>
          <small>Por ${post.autor}</small>
        </div>
      `;

      lista.appendChild(div);
    });
  }

  carregarPosts();
</script>

</body>
</html>
