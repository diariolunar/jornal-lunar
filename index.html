<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Diário Lunar</title>
</head>

<body style="font-family: Arial; max-width:800px; margin:auto;">

<h1>Diário Lunar</h1>

<button onclick="loginGoogle()">Entrar com Google</button>

<h2>Matérias</h2>
<div id="lista"></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
  import { getAuth, signInWithPopup, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";
  import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAHtrL1LEtpnKZ9QdGl2ehveCOZLWM94VE",
    authDomain: "diario-lunar-dee91.firebaseapp.com",
    projectId: "diario-lunar-dee91",
    storageBucket: "diario-lunar-dee91.firebasestorage.app",
    messagingSenderId: "817640390152",
    appId: "1:817640390152:web:89e4b6a032b2124a6f1bbd"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);
  const provider = new GoogleAuthProvider();

  window.loginGoogle = function () {
    signInWithPopup(auth, provider);
  };

  async function carregarPosts() {
    const querySnapshot = await getDocs(collection(db, "posts"));
    const lista = document.getElementById("lista");

    lista.innerHTML = "";

    querySnapshot.forEach((doc) => {
      const post = doc.data();

      const div = document.createElement("div");
      div.style.border = "1px solid #ccc";
      div.style.padding = "10px";
      div.style.marginBottom = "10px";

      div.innerHTML = `
        <h3>${post.titulo}</h3>
        <p>${post.conteudo}</p>
        <small>Por ${post.autor}</small>
      `;

      lista.appendChild(div);
    });
  }

  carregarPosts();
</script>

</body>
</html>
