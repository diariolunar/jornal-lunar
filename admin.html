<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Painel ADM - Diário Lunar</title>

<link rel="icon" href="favicon.png">
<link rel="apple-touch-icon" href="favicon.png">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.css">

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #F8F6F1;
  color: #07101F;
}

.login-screen {
  display: flex;
  height: 100vh;
}

.login-left {
  flex: 1;
  background: radial-gradient(circle at bottom, #1e1b4b, #020617);
  color: white;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  padding: 60px;
  text-align: center;
}

.logo-vertical {
  width: 220px;
  margin-bottom: 30px;
}

.login-right {
  flex: 1;
  background: #F8F6F1;
  display: flex;
  justify-content: center;
  align-items: center;
}

.login-box {
  width: 430px;
}

.login-box h1 {
  font-size: 34px;
}

.login-box p {
  color: #6b7280;
  margin-bottom: 35px;
}

.login-box label {
  font-weight: bold;
  display: block;
  margin-bottom: 8px;
}

.login-box input {
  width: 100%;
  box-sizing: border-box;
  padding: 16px;
  margin-bottom: 24px;
  border-radius: 14px;
  border: 1px solid #d1d5db;
  font-size: 15px;
}

.login-box button {
  width: 100%;
  padding: 16px;
  border: none;
  border-radius: 14px;
  background: linear-gradient(90deg, #0EA5E9, #6D28D9);
  color: white;
  font-size: 17px;
  cursor: pointer;
}

.layout {
  display: none;
  min-height: 100vh;
}

.sidebar {
  width: 270px;
  background: #07101F;
  color: white;
  padding: 28px;
  box-sizing: border-box;
  background-image: radial-gradient(circle at bottom, rgba(109,40,217,0.45), transparent 35%);
}

.sidebar-logo {
  width: 150px;
  margin-bottom: 25px;
}

.voltar-site {
  display: block;
  color: white;
  text-decoration: none;
  border: 1px solid rgba(255,255,255,0.2);
  padding: 11px;
  border-radius: 14px;
  text-align: center;
  margin-bottom: 25px;
}

.perfil {
  text-align: center;
  margin-bottom: 28px;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.perfil-foto {
  width: 92px;
  height: 92px;
  border-radius: 50%;
  object-fit: cover;
  background: #6D28D9;
  margin-bottom: 12px;
  display: block;
}

.perfil h3 {
  margin: 5px 0;
}

.perfil p {
  margin: 5px 0;
  color: #cbd5e1;
}

.nomenclatura {
  display: inline-block;
  margin-top: 8px;
  background: linear-gradient(90deg, #0EA5E9, #6D28D9);
  padding: 7px 13px;
  border-radius: 999px;
  font-size: 13px;
}

.menu-btn {
  display: block;
  width: 100%;
  text-align: left;
  padding: 14px 16px;
  margin-bottom: 10px;
  background: transparent;
  color: white;
  border: none;
  border-radius: 14px;
  cursor: pointer;
  font-size: 15px;
}

.menu-btn:hover,
.menu-btn.active {
  background: linear-gradient(90deg, #0EA5E9, #6D28D9);
}

.main {
  flex: 1;
  padding: 38px;
  box-sizing: border-box;
}

.topo-painel {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 28px;
}

.data-box {
  background: white;
  padding: 14px 18px;
  border-radius: 14px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.05);
}

.metricas {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 22px;
  margin-bottom: 28px;
}

.metrica {
  background: white;
  padding: 26px;
  border-radius: 22px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.05);
}

.metrica .icone {
  width: 48px;
  height: 48px;
  border-radius: 50%;
  background: #ede9fe;
  color: #6D28D9;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  margin-bottom: 20px;
}

.metrica h2 {
  font-size: 34px;
  margin: 0;
}

.metrica p {
  color: #64748b;
  margin: 8px 0 0;
}

.card {
  background: white;
  padding: 26px;
  border-radius: 22px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.05);
}

.lista-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 18px;
}

.materia-linha {
  display: grid;
  grid-template-columns: 95px 1fr 150px 110px 170px;
  gap: 18px;
  align-items: center;
  padding: 18px 0;
  border-bottom: 1px solid #e5e7eb;
}

.materia-linha img {
  width: 95px;
  height: 65px;
  object-fit: cover;
  border-radius: 14px;
  background: #e5e7eb;
}

.badge {
  background: #ede9fe;
  color: #6D28D9;
  padding: 8px 13px;
  border-radius: 999px;
  font-size: 12px;
  font-weight: bold;
  display: inline-block;
  text-align: center;
}

.btn {
  background: linear-gradient(90deg, #0EA5E9, #6D28D9);
  color: white;
  padding: 11px 18px;
  border: none;
  border-radius: 12px;
  cursor: pointer;
  text-decoration: none;
}

.btn-dark {
  background: #07101F;
}

.btn-red {
  background: #ef4444;
}

.acoes {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}

.form-grid {
  display: grid;
  grid-template-columns: 1fr 1.4fr;
  gap: 26px;
}

input, textarea, select {
  width: 100%;
  box-sizing: border-box;
  padding: 13px;
  margin-bottom: 14px;
  border-radius: 12px;
  border: 1px solid #d1d5db;
  font-family: Arial, sans-serif;
}

.editor-toolbar {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-bottom: 10px;
}

.editor-toolbar button {
  padding: 9px 12px;
  border: none;
  border-radius: 10px;
  background: #ede9fe;
  color: #6D28D9;
  cursor: pointer;
  font-weight: bold;
}

.editor {
  min-height: 360px;
  border: 1px solid #d1d5db;
  border-radius: 14px;
  padding: 18px;
  background: white;
  line-height: 1.7;
  outline: none;
}

.preview-img {
  width: 100%;
  aspect-ratio: 16 / 9;
  object-fit: cover;
  border-radius: 16px;
  margin-bottom: 14px;
  display: none;
  background: #ede9fe;
}

.preview-perfil {
  width: 110px;
  height: 110px;
  object-fit: cover;
  border-radius: 50%;
  display: block;
  margin-bottom: 15px;
  background: #ede9fe;
}

.crop-modal {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(7, 16, 31, 0.85);
  z-index: 9999;
  align-items: center;
  justify-content: center;
  padding: 30px;
  box-sizing: border-box;
}

.crop-box {
  background: white;
  border-radius: 22px;
  padding: 22px;
  width: min(900px, 95vw);
  max-height: 90vh;
  box-sizing: border-box;
}

.crop-area {
  width: 100%;
  max-height: 60vh;
  overflow: hidden;
  border-radius: 14px;
  background: #f1f5f9;
}

.crop-area img {
  display: block;
  max-width: 100%;
}

.crop-actions {
  margin-top: 18px;
  display: flex;
  justify-content: flex-end;
  gap: 10px;
}

@media (max-width: 1000px) {
  .metricas {
    grid-template-columns: repeat(2, 1fr);
  }

  .form-grid {
    grid-template-columns: 1fr;
  }

  .materia-linha {
    grid-template-columns: 80px 1fr;
  }
}
@media (max-width: 768px) {
  .login-screen {
    flex-direction: column;
    min-height: 100vh;
    height: auto;
  }

  .login-left {
    flex: none;
    min-height: 38vh;
    padding: 35px 25px;
  }

  .logo-vertical {
    width: 150px;
    margin-bottom: 15px;
  }

  .login-left h2 {
    font-size: 20px;
    margin: 10px 0;
  }

  .login-left p {
    font-size: 14px;
    max-width: 260px;
  }

  .login-right {
    flex: none;
    padding: 35px 25px;
  }

  .login-box {
    width: 100%;
    max-width: 420px;
  }

  .login-box h1 {
    font-size: 28px;
  }

  .login-box input {
    font-size: 15px;
  }
}
</style>
</head>

<body>

<div id="login" class="login-screen">
  <div class="login-left">
    <img src="logo-vertical.png" class="logo-vertical">
    <h2>Painel administrativo</h2>
    <p>Acesse sua conta para gerenciar o conteúdo do site.</p>
  </div>

  <div class="login-right">
    <div class="login-box">
      <h1>Entrar na Área ADM</h1>
      <p>Digite suas credenciais para acessar.</p>

      <label>E-mail</label>
      <input id="email" placeholder="Digite seu e-mail">

      <label>Senha</label>
      <input id="senha" type="password" placeholder="Digite sua senha">

      <button onclick="logar()">Entrar</button>
    </div>
  </div>
</div>

<div id="layout" class="layout">
  <aside class="sidebar">
    <a class="voltar-site" href="/">← Voltar ao site</a>

    <img src="logo-diario-lunar2.png" class="sidebar-logo">

    <div class="perfil">
      <img id="fotoPerfilSidebar" class="perfil-foto" src="logo-vertical.png">
      <h3 id="nome"></h3>
      <p id="user"></p>
      <span id="nomenclatura" class="nomenclatura"></span>
    </div>

    <button class="menu-btn active" onclick="dashboard()">Painel</button>
    <button class="menu-btn" onclick="novaMateria()">Nova Matéria</button>
    <button class="menu-btn" onclick="listar()">Matérias Publicadas</button>
    <button class="menu-btn" onclick="editarPerfil()">Editar Perfil</button>
    <button class="menu-btn" id="btnCadastrar" onclick="cadastrarADM()" style="display:none;">Cadastrar ADM</button>
    <button class="menu-btn" onclick="sair()">Sair</button>
  </aside>

  <main class="main" id="conteudo"></main>
</div>

<div id="cropModal" class="crop-modal">
  <div class="crop-box">
    <h2 id="cropTitulo">Recortar imagem</h2>
    <div class="crop-area">
      <img id="cropImagem">
    </div>
    <div class="crop-actions">
      <button class="btn btn-dark" id="cancelarCrop">Cancelar</button>
      <button class="btn" id="confirmarCrop">Usar imagem recortada</button>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.js"></script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import {
  getAuth,
  signInWithEmailAndPassword,
  createUserWithEmailAndPassword,
  onAuthStateChanged,
  signOut,
  updatePassword
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";

import {
  getFirestore,
  doc,
  getDoc,
  setDoc,
  collection,
  addDoc,
  getDocs,
  deleteDoc,
  updateDoc
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

import {
  getStorage,
  ref,
  uploadBytes,
  getDownloadURL
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-storage.js";

const firebaseConfig = {
  apiKey: "AIzaSyAHtrL1LEtpnKZ9QdGl2ehveCOZLWM94VE",
  authDomain: "diario-lunar-dee91.firebaseapp.com",
  projectId: "diario-lunar-dee91",
  storageBucket: "diario-lunar-dee91.firebasestorage.app",
  messagingSenderId: "817640390152",
  appId: "1:817640390152:web:89e4b6a032b2124a6f1bbd"
};

const app = initializeApp(firebaseConfig);
const secondaryApp = initializeApp(firebaseConfig, "Secondary");

const auth = getAuth(app);
const secondaryAuth = getAuth(secondaryApp);
const db = getFirestore(app);
const storage = getStorage(app);

let uid = null;
let perfil = null;
let editId = null;
let imagemAtual = "";

let imagemMateriaBlob = null;
let fotoPerfilBlob = null;
let fotoADMBlob = null;

let cropper = null;
let cropResolver = null;
let cropConfigAtual = null;

window.logar = async () => {
  try {
    await signInWithEmailAndPassword(auth, email.value, senha.value);
  } catch (error) {
    alert("Login inválido. Verifique o e-mail e a senha.");
  }
};

onAuthStateChanged(auth, async (u) => {
  if (!u) return;

  uid = u.uid;

  const snap = await getDoc(doc(db, "admins", uid));

  if (!snap.exists()) {
    alert("Acesso não autorizado.");
    await signOut(auth);
    return;
  }

  perfil = snap.data();

  document.getElementById("login").style.display = "none";
  document.getElementById("layout").style.display = "flex";

  atualizarSidebar();

  if (perfil.role === "superadmin") {
    document.getElementById("btnCadastrar").style.display = "block";
  } else {
    document.getElementById("btnCadastrar").style.display = "none";
  }

  dashboard();
});

function atualizarSidebar() {
  document.getElementById("nome").innerText = perfil.nome || "Administrador";
  document.getElementById("user").innerText = "@" + (perfil.user || "admin");
  document.getElementById("nomenclatura").innerText = perfil.nomenclatura || "Administrador";
  document.getElementById("fotoPerfilSidebar").src = perfil.fotoUrl || "logo-vertical.png";
}

function marcarAtivo(texto) {
  document.querySelectorAll(".menu-btn").forEach(btn => {
    btn.classList.remove("active");
    if (btn.innerText.includes(texto)) btn.classList.add("active");
  });
}

function formatarData(data) {
  if (!data) return "Sem data";

  try {
    if (data.toDate) {
      return data.toDate().toLocaleDateString("pt-BR");
    }
    return new Date(data).toLocaleDateString("pt-BR");
  } catch {
    return "Sem data";
  }
}

async function uploadBlob(blob, pasta, nomeBase = "imagem") {
  const caminho = `${pasta}/${Date.now()}-${nomeBase}.jpg`;
  const arquivoRef = ref(storage, caminho);

  await uploadBytes(arquivoRef, blob, {
    contentType: "image/jpeg"
  });

  return await getDownloadURL(arquivoRef);
}

function abrirCrop(arquivo, config) {
  cropConfigAtual = config;

  return new Promise((resolve, reject) => {
    cropResolver = { resolve, reject };

    const url = URL.createObjectURL(arquivo);
    const cropModal = document.getElementById("cropModal");
    const cropImagem = document.getElementById("cropImagem");
    const cropTitulo = document.getElementById("cropTitulo");

    cropTitulo.innerText = config.titulo || "Recortar imagem";
    cropImagem.src = url;

    cropModal.style.display = "flex";

    cropImagem.onload = () => {
      if (cropper) {
        cropper.destroy();
      }

      cropper = new Cropper(cropImagem, {
        aspectRatio: config.aspectRatio,
        viewMode: 1,
        dragMode: "move",
        autoCropArea: 1,
        background: false,
        responsive: true
      });
    };
  });
}

document.getElementById("cancelarCrop").onclick = () => {
  if (cropper) {
    cropper.destroy();
    cropper = null;
  }

  document.getElementById("cropModal").style.display = "none";

  if (cropResolver) {
    cropResolver.resolve(null);
    cropResolver = null;
  }
};

document.getElementById("confirmarCrop").onclick = () => {
  if (!cropper || !cropConfigAtual) return;

  const canvas = cropper.getCroppedCanvas({
    width: cropConfigAtual.width,
    height: cropConfigAtual.height,
    imageSmoothingEnabled: true,
    imageSmoothingQuality: "high"
  });

  canvas.toBlob((blob) => {
    cropper.destroy();
    cropper = null;

    document.getElementById("cropModal").style.display = "none";

    if (cropResolver) {
      cropResolver.resolve(blob);
      cropResolver = null;
    }
  }, "image/jpeg", 0.9);
};

async function prepararImagemMateria(input, preview) {
  const file = input.files[0];

  if (!file) return;

  const blob = await abrirCrop(file, {
    titulo: "Recortar imagem da matéria",
    aspectRatio: 16 / 9,
    width: 1280,
    height: 720
  });

  if (!blob) {
    input.value = "";
    return;
  }

  imagemMateriaBlob = blob;
  preview.src = URL.createObjectURL(blob);
  preview.style.display = "block";
}

async function prepararFotoPerfil(input, preview, destino) {
  const file = input.files[0];

  if (!file) return;

  const blob = await abrirCrop(file, {
    titulo: "Recortar foto de perfil",
    aspectRatio: 1,
    width: 500,
    height: 500
  });

  if (!blob) {
    input.value = "";
    return;
  }

  if (destino === "perfil") {
    fotoPerfilBlob = blob;
  }

  if (destino === "adm") {
    fotoADMBlob = blob;
  }

  preview.src = URL.createObjectURL(blob);
}

function getDataNumber(post) {
  if (post.data?.toDate) {
    return post.data.toDate().getTime();
  }

  if (post.data) {
    return new Date(post.data).getTime();
  }

  return 0;
}

window.sair = async () => {
  await signOut(auth);

  uid = null;
  perfil = null;

  document.getElementById("login").style.display = "flex";
  document.getElementById("layout").style.display = "none";
};

window.dashboard = async () => {
  marcarAtivo("Painel");

  const postsSnap = await getDocs(collection(db, "posts"));
  const comentariosSnap = await getDocs(collection(db, "comentarios"));

  let listaPosts = [];
  let totalCurtidas = 0;
  let totalMes = 0;

  const mesAtual = new Date().getMonth();
  const anoAtual = new Date().getFullYear();

  postsSnap.forEach((d) => {
    const p = d.data();

    totalCurtidas += p.curtidas || 0;

    const dataNum = getDataNumber(p);
    const dataPost = dataNum ? new Date(dataNum) : null;

    if (dataPost && dataPost.getMonth() === mesAtual && dataPost.getFullYear() === anoAtual) {
      totalMes++;
    }

    listaPosts.push({
      id: d.id,
      ...p,
      dataNum
    });
  });

  listaPosts.sort((a, b) => b.dataNum - a.dataNum);

  let ultimas = "";

  listaPosts.slice(0, 3).forEach((p) => {
    ultimas += `
      <div class="materia-linha" style="grid-template-columns:90px 1fr 120px;">
        <img src="${p.imagem || ""}">
        <div>
          <strong>${p.titulo || ""}</strong>
          <p style="margin:6px 0 0; color:#64748b;">Publicado em ${formatarData(p.data)}</p>
        </div>
        <span class="badge">Publicado</span>
      </div>
    `;
  });

  document.getElementById("conteudo").innerHTML = `
    <div class="topo-painel">
      <div>
        <h1>Painel de Controle</h1>
        <p>Bem-vindo de volta, ${perfil.nome}. Aqui está um resumo do seu conteúdo.</p>
      </div>
      <div class="data-box">📅 ${new Date().toLocaleDateString("pt-BR")}</div>
    </div>

    <div class="metricas">
      <div class="metrica">
        <div class="icone">📰</div>
        <h2>${listaPosts.length}</h2>
        <p>Matérias publicadas</p>
      </div>

      <div class="metrica">
        <div class="icone">💜</div>
        <h2>${totalCurtidas}</h2>
        <p>Curtidas totais</p>
      </div>

      <div class="metrica">
        <div class="icone">💬</div>
        <h2>${comentariosSnap.size}</h2>
        <p>Comentários</p>
      </div>

      <div class="metrica">
        <div class="icone">📅</div>
        <h2>${totalMes}</h2>
        <p>Matérias este mês</p>
      </div>
    </div>

    <div class="card">
      <div class="lista-header">
        <h2>Últimas matérias publicadas</h2>
        <button class="btn" onclick="listar()">Ver todas</button>
      </div>
      ${ultimas || "<p>Nenhuma matéria publicada ainda.</p>"}
    </div>
  `;
};

window.formatarTexto = function(comando) {
  document.execCommand(comando, false, null);
};

window.novaMateria = (p = null, id = null) => {
  marcarAtivo("Nova Matéria");

  editId = id;
  imagemAtual = p?.imagem || "";
  imagemMateriaBlob = null;

  document.getElementById("conteudo").innerHTML = `
    <div class="topo-painel">
      <div>
        <h1>${p ? "Editar Matéria" : "Nova Matéria"}</h1>
        <p>Cadastre ou edite uma publicação do Diário Lunar.</p>
      </div>
    </div>

    <div class="card">
      <div class="form-grid">
        <div>
          <label>Título da matéria</label>
          <input id="titulo" placeholder="Digite o título da matéria" value="${p?.titulo || ""}">

          <label>Categoria</label>
          <select id="categoria">
            <option value="">Selecione uma categoria</option>
            <option value="Literatura" ${p?.categoria === "Literatura" ? "selected" : ""}>Literatura</option>
            <option value="Comunidade" ${p?.categoria === "Comunidade" ? "selected" : ""}>Comunidade</option>
            <option value="Autores" ${p?.categoria === "Autores" ? "selected" : ""}>Autores</option>
            <option value="Eventos" ${p?.categoria === "Eventos" ? "selected" : ""}>Eventos</option>
            <option value="Resenhas" ${p?.categoria === "Resenhas" ? "selected" : ""}>Resenhas</option>
            <option value="Entrevistas" ${p?.categoria === "Entrevistas" ? "selected" : ""}>Entrevistas</option>
            <option value="Destaques Lunar" ${p?.categoria === "Destaques Lunar" ? "selected" : ""}>Destaques Lunar</option>
          </select>

          <label>Imagem da matéria</label>
          <img id="previewImagem" class="preview-img" src="${p?.imagem || ""}" style="${p?.imagem ? "display:block;" : ""}">
          <input id="arquivoImagem" type="file" accept="image/*">

          <p style="color:#64748b; font-size:14px;">A imagem será recortada em 16:9 antes do envio.</p>
        </div>

        <div>
          <label>Texto da matéria</label>

          <div class="editor-toolbar">
            <button type="button" onclick="formatarTexto('bold')">B</button>
            <button type="button" onclick="formatarTexto('italic')">I</button>
            <button type="button" onclick="formatarTexto('underline')">U</button>
            <button type="button" onclick="formatarTexto('justifyLeft')">⬅</button>
            <button type="button" onclick="formatarTexto('justifyCenter')">⬌</button>
            <button type="button" onclick="formatarTexto('justifyRight')">➡</button>
            <button type="button" onclick="formatarTexto('justifyFull')">☰</button>
          </div>

          <div id="editorMateria" class="editor" contenteditable="true">${p?.conteudo || ""}</div>
        </div>
      </div>

      <div style="margin-top:20px; display:flex; gap:10px;">
        <button class="btn" onclick="salvar()">${p ? "Salvar alterações" : "Publicar"}</button>
        ${p ? `<button class="btn btn-dark" onclick="listar()">Cancelar edição</button>` : ""}
      </div>
    </div>
  `;

  const arquivoImagem = document.getElementById("arquivoImagem");
  const previewImagem = document.getElementById("previewImagem");

  arquivoImagem.addEventListener("change", () => {
    prepararImagemMateria(arquivoImagem, previewImagem);
  });
};

window.salvar = async () => {
  let imagemFinal = imagemAtual;

  if (imagemMateriaBlob) {
    imagemFinal = await uploadBlob(imagemMateriaBlob, "materias", "materia");
  }

  const dados = {
    titulo: titulo.value.trim(),
    imagem: imagemFinal,
    categoria: categoria.value,
    conteudo: editorMateria.innerHTML.trim(),
    autor: perfil.user,
    atualizadoEm: new Date()
  };

  if (!dados.titulo || !dados.imagem || !dados.categoria || !dados.conteudo) {
    alert("Preencha título, imagem, categoria e conteúdo.");
    return;
  }

  if (editId) {
    await updateDoc(doc(db, "posts", editId), dados);
    alert("Matéria atualizada!");
  } else {
    await addDoc(collection(db, "posts"), {
      ...dados,
      data: new Date(),
      curtidas: 0
    });
    alert("Matéria publicada!");
  }

  editId = null;
  imagemAtual = "";
  imagemMateriaBlob = null;
  listar();
};

window.listar = async () => {
  marcarAtivo("Matérias");

  const snap = await getDocs(collection(db, "posts"));

  let listaPosts = [];

  snap.forEach(d => {
    const p = d.data();

    listaPosts.push({
      id: d.id,
      ...p,
      dataNum: getDataNumber(p)
    });
  });

  listaPosts.sort((a, b) => b.dataNum - a.dataNum);

  let linhas = "";

  listaPosts.forEach(p => {
    linhas += `
      <div class="materia-linha">
        <img src="${p.imagem || ""}">
        <div>
          <strong>${p.titulo || ""}</strong>
          <p style="margin:6px 0 0; color:#64748b;">Publicado em ${formatarData(p.data)}</p>
        </div>
        <span class="badge">${p.categoria || "Matéria"}</span>
        <span>${formatarData(p.data)}</span>
        <div class="acoes">
          <button class="btn" onclick="editar('${p.id}')">Editar</button>
          <button class="btn btn-red" onclick="excluir('${p.id}')">Excluir</button>
        </div>
      </div>
    `;
  });

  document.getElementById("conteudo").innerHTML = `
    <div class="topo-painel">
      <div>
        <h1>Matérias Publicadas</h1>
        <p>Gerencie, edite ou exclua as matérias do Diário Lunar.</p>
      </div>
      <button class="btn" onclick="novaMateria()">Nova Matéria</button>
    </div>

    <div class="card">
      ${linhas || "<p>Nenhuma matéria publicada ainda.</p>"}
    </div>
  `;
};

window.editar = async (id) => {
  const snap = await getDoc(doc(db, "posts", id));

  if (!snap.exists()) {
    alert("Matéria não encontrada.");
    return;
  }

  novaMateria(snap.data(), id);
};

window.excluir = async (id) => {
  if (!confirm("Deseja excluir esta matéria?")) return;

  await deleteDoc(doc(db, "posts", id));
  alert("Matéria excluída.");
  listar();
};

window.editarPerfil = () => {
  marcarAtivo("Editar Perfil");
  fotoPerfilBlob = null;

  document.getElementById("conteudo").innerHTML = `
    <div class="topo-painel">
      <div>
        <h1>Editar Perfil</h1>
        <p>Atualize suas informações exibidas no painel.</p>
      </div>
    </div>

    <div class="card">
      <label>Foto de perfil</label>
      <img id="previewFotoPerfil" class="preview-perfil" src="${perfil.fotoUrl || "logo-vertical.png"}">
      <input id="novaFotoPerfil" type="file" accept="image/*">

      <label>Nome</label>
      <input id="nomeNovo" value="${perfil.nome || ""}">

      <label>User</label>
      <input id="userNovo" value="${perfil.user || ""}">

      <label>Nomenclatura no jornal</label>
      <input id="nomenNovo" value="${perfil.nomenclatura || ""}">

      <label>Nova senha</label>
      <input id="senhaNova" type="password" placeholder="Digite uma nova senha se quiser alterar">

      <button class="btn" onclick="salvarPerfil()">Salvar alterações</button>
    </div>
  `;

  const inputFoto = document.getElementById("novaFotoPerfil");
  const preview = document.getElementById("previewFotoPerfil");

  inputFoto.addEventListener("change", () => {
    prepararFotoPerfil(inputFoto, preview, "perfil");
  });
};

window.salvarPerfil = async () => {
  let fotoUrl = perfil.fotoUrl || "";

  if (fotoPerfilBlob) {
    fotoUrl = await uploadBlob(fotoPerfilBlob, `perfis/${uid}`, "perfil");
  }

  await updateDoc(doc(db, "admins", uid), {
    nome: nomeNovo.value.trim(),
    user: userNovo.value.trim(),
    nomenclatura: nomenNovo.value.trim(),
    fotoUrl: fotoUrl
  });

  const novaSenha = senhaNova.value.trim();

  if (novaSenha) {
    try {
      await updatePassword(auth.currentUser, novaSenha);
      alert("Perfil e senha atualizados.");
    } catch (error) {
      alert("Perfil atualizado, mas a senha não foi alterada. Faça login novamente e tente trocar a senha.");
    }
  } else {
    alert("Perfil atualizado.");
  }

  const snap = await getDoc(doc(db, "admins", uid));
  perfil = snap.data();

  fotoPerfilBlob = null;
  atualizarSidebar();
  editarPerfil();
};

window.cadastrarADM = () => {
  if (perfil.role !== "superadmin") {
    alert("Você não tem permissão para cadastrar ADM.");
    return;
  }

  marcarAtivo("Cadastrar ADM");
  fotoADMBlob = null;

  document.getElementById("conteudo").innerHTML = `
    <div class="topo-painel">
      <div>
        <h1>Cadastrar ADM</h1>
        <p>Crie um novo acesso administrativo para o Diário Lunar.</p>
      </div>
    </div>

    <div class="card">
      <div class="form-grid">
        <div>
          <label>Imagem de perfil</label>
          <img id="previewFotoADM" class="preview-perfil" src="logo-vertical.png">
          <input id="fotoADM" type="file" accept="image/*">

          <label>Nome</label>
          <input id="nomeADM" placeholder="Nome do ADM">

          <label>E-mail</label>
          <input id="emailADM" placeholder="E-mail do ADM">
        </div>

        <div>
          <label>User</label>
          <input id="userADM" placeholder="User do ADM">

          <label>Nomenclatura no jornal</label>
          <input id="nomenADM" placeholder="Ex: Editor, Colunista, Administrador">

          <label>Senha de acesso</label>
          <input id="senhaADM" type="password" placeholder="Senha inicial do ADM">

          <button class="btn" onclick="salvarADM()">Cadastrar ADM</button>
        </div>
      </div>
    </div>
  `;

  const inputFoto = document.getElementById("fotoADM");
  const preview = document.getElementById("previewFotoADM");

  inputFoto.addEventListener("change", () => {
    prepararFotoPerfil(inputFoto, preview, "adm");
  });
};

window.salvarADM = async () => {
  if (perfil.role !== "superadmin") {
    alert("Você não tem permissão para cadastrar ADM.");
    return;
  }

  const nome = nomeADM.value.trim();
  const email = emailADM.value.trim();
  const user = userADM.value.trim();
  const nomenclatura = nomenADM.value.trim();
  const senha = senhaADM.value.trim();

  if (!nome || !email || !user || !nomenclatura || !senha) {
    alert("Preencha Nome, Email, User, Nomenclatura e Senha.");
    return;
  }

  try {
    const credencial = await createUserWithEmailAndPassword(secondaryAuth, email, senha);
    const novoUid = credencial.user.uid;

    let fotoUrl = "";

    if (fotoADMBlob) {
      fotoUrl = await uploadBlob(fotoADMBlob, `perfis/${novoUid}`, "perfil-adm");
    }

    await setDoc(doc(db, "admins", novoUid), {
      nome: nome,
      email: email,
      user: user,
      nomenclatura: nomenclatura,
      fotoUrl: fotoUrl,
      role: "admin",
      criadoEm: new Date(),
      criadoPor: uid
    });

    await signOut(secondaryAuth);

    alert("ADM cadastrado com sucesso!");

    fotoADMBlob = null;
    cadastrarADM();
  } catch (error) {
    console.error(error);
    alert("Erro ao cadastrar ADM. Verifique se o e-mail já não está cadastrado e se a senha tem pelo menos 6 caracteres.");
  }
};
</script>

</body>
