<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Painel ADM - Diário Lunar</title>
</head>

<body style="font-family: Arial; max-width:700px; margin:auto; padding:30px;">

<h1>Painel ADM</h1>

<input id="titulo" placeholder="Título da matéria" style="width:100%; padding:10px; margin-bottom:10px;">

<input id="imagem" placeholder="Link da imagem da matéria" style="width:100%; padding:10px; margin-bottom:10px;">

<select id="categoria" style="width:100%; padding:10px; margin-bottom:10px;">
  <option value="">Escolha a categoria</option>
  <option value="Literatura">Literatura</option>
  <option value="Comunidade">Comunidade</option>
  <option value="Autores">Autores</option>
  <option value="Eventos">Eventos</option>
  <option value="Resenhas">Resenhas</option>
  <option value="Entrevistas">Entrevistas</option>
  <option value="Destaques Lunar">Destaques Lunar</option>
</select>

<textarea id="conteudo" placeholder="Conteúdo da matéria" style="width:100%; height:220px; padding:10px;"></textarea>

<br><br>

<button onclick="publicar()" style="background:#6B21A8; color:white; padding:12px 22px; border:none; border-radius:10px;">
  Publicar matéria
</button>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
  import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";
  import { getFirestore, addDoc, collection } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAHtrL1LEtpnKZ9QdGl2ehveCOZLWM94VE",
    authDomain: "diario-lunar-dee91.firebaseapp.com",
    projectId: "diario-lunar-dee91",
    storageBucket: "diario-lunar-dee91.firebasestorage.app",
    messagingSenderId: "817640390152",
    appId: "1:817640390152:web:89e4b6a032b2124a6f1bbd"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  let userAtual = null;

  onAuthStateChanged(auth, (user) => {
    if (user) {
      userAtual = user;
    } else {
      alert("Você precisa estar logado.");
      window.location.href = "/";
    }
  });

  window.publicar = async function () {
    const titulo = document.getElementById("titulo").value;
    const imagem = document.getElementById("imagem").value;
    const categoria = document.getElementById("categoria").value;
    const conteudo = document.getElementById("conteudo").value;

    if (!titulo || !imagem || !categoria || !conteudo) {
      alert("Preencha todos os campos.");
      return;
    }

    await addDoc(collection(db, "posts"), {
      titulo,
      imagem,
      categoria,
      conteudo,
      autor: userAtual.email,
      curtidas: 0,
      data: new Date()
    });

    alert("Matéria publicada!");

    document.getElementById("titulo").value = "";
    document.getElementById("imagem").value = "";
    document.getElementById("categoria").value = "";
    document.getElementById("conteudo").value = "";
  };
</script>

</body>
</html>
