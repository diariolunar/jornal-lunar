<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Painel ADM - Diário Lunar</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #F8F6F1;
}

.layout {
  display: none;
  height: 100vh;
}

.sidebar {
  width: 260px;
  background: #07101F;
  color: white;
  padding: 25px;
}

.sidebar img {
  width: 70px;
  border-radius: 50%;
}

.sidebar h3 {
  margin: 10px 0 0;
}

.sidebar button {
  width: 100%;
  margin-top: 12px;
  padding: 12px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
}

.main {
  flex: 1;
  padding: 30px;
}

.card {
  background: white;
  padding: 25px;
  border-radius: 20px;
}

input, textarea, select {
  width: 100%;
  padding: 10px;
  margin-bottom: 10px;
}

.login {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}
</style>
</head>

<body>

<div id="login" class="login">
  <button onclick="login()">Entrar com Google</button>
</div>

<div id="layout" class="layout">

  <div class="sidebar">
    <img id="foto">
    <h3 id="nome"></h3>
    <p id="email"></p>

    <button onclick="dashboard()">Dashboard</button>
    <button onclick="novaMateria()">Nova Matéria</button>
    <button onclick="listarMaterias()">Matérias</button>
    <button onclick="logout()">Sair</button>
  </div>

  <div class="main" id="conteudo"></div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import {
  getAuth,
  GoogleAuthProvider,
  signInWithPopup,
  onAuthStateChanged,
  signOut
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";

import {
  getFirestore,
  collection,
  addDoc,
  getDocs,
  doc,
  deleteDoc,
  updateDoc,
  getDoc
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAHtrL1LEtpnKZ9QdGl2ehveCOZLWM94VE",
  authDomain: "diario-lunar-dee91.firebaseapp.com",
  projectId: "diario-lunar-dee91"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const provider = new GoogleAuthProvider();

let user = null;
let editId = null;

window.login = async () => {
  await signInWithPopup(auth, provider);
};

onAuthStateChanged(auth, (u) => {
  if (u) {
    user = u;

    document.getElementById("login").style.display = "none";
    document.getElementById("layout").style.display = "flex";

    document.getElementById("foto").src = u.photoURL;
    document.getElementById("nome").innerText = u.displayName;
    document.getElementById("email").innerText = u.email;

    dashboard();
  } else {
    document.getElementById("login").style.display = "flex";
    document.getElementById("layout").style.display = "none";
  }
});

window.logout = () => signOut(auth);

window.dashboard = async () => {
  const snap = await getDocs(collection(db, "posts"));

  document.getElementById("conteudo").innerHTML = `
    <div class="card">
      <h1>Painel Administrativo</h1>
      <p>Total de matérias: ${snap.size}</p>
    </div>
  `;
};

window.novaMateria = (post=null, id=null) => {
  editId = id;

  document.getElementById("conteudo").innerHTML = `
    <div class="card">
      <h1>${post ? "Editar" : "Nova"} Matéria</h1>

      <input id="titulo" placeholder="Título" value="${post?.titulo || ""}">
      <input id="imagem" placeholder="Imagem" value="${post?.imagem || ""}">
      
      <select id="categoria">
        <option>Literatura</option>
        <option>Comunidade</option>
        <option>Autores</option>
        <option>Eventos</option>
        <option>Resenhas</option>
        <option>Entrevistas</option>
      </select>

      <input id="resumo" placeholder="Resumo" value="${post?.resumo || ""}">
      <textarea id="conteudo">${post?.conteudo || ""}</textarea>

      <button onclick="salvar()">Salvar</button>
    </div>
  `;
};

window.salvar = async () => {
  const data = {
    titulo: titulo.value,
    imagem: imagem.value,
    categoria: categoria.value,
    resumo: resumo.value,
    conteudo: conteudo.value,
    autor: user.email,
    data: new Date()
  };

  if (editId) {
    await updateDoc(doc(db,"posts",editId), data);
  } else {
    await addDoc(collection(db,"posts"), data);
  }

  listarMaterias();
};

window.listarMaterias = async () => {
  const snap = await getDocs(collection(db,"posts"));

  let html = `<div class="card"><h1>Matérias</h1>`;

  snap.forEach(d => {
    const p = d.data();

    html += `
      <div style="margin-top:15px;">
        <h3>${p.titulo}</h3>
        <button onclick="editar('${d.id}')">Editar</button>
        <button onclick="excluir('${d.id}')">Excluir</button>
      </div>
    `;
  });

  html += `</div>`;

  document.getElementById("conteudo").innerHTML = html;
};

window.editar = async (id) => {
  const snap = await getDoc(doc(db,"posts",id));
  novaMateria(snap.data(), id);
};

window.excluir = async (id) => {
  if(confirm("Excluir?")){
    await deleteDoc(doc(db,"posts",id));
    listarMaterias();
  }
};
</script>

</body>
</html>
