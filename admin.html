<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Painel ADM - Diário Lunar</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #F8F6F1;
}

/* LOGIN */
.login-screen {
  display: flex;
  height: 100vh;
}

.login-left {
  flex: 1;
  background: radial-gradient(circle at bottom, #1e1b4b, #020617);
  color: white;
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 60px;
}

.logo-vertical {
  width: 120px;
  margin-bottom: 20px;
}

.login-right {
  flex: 1;
  display: flex;
  justify-content: center;
  align-items: center;
}

.login-box {
  width: 350px;
}

.login-box input {
  width: 100%;
  padding: 14px;
  margin-top: 10px;
  border-radius: 10px;
  border: 1px solid #ddd;
}

.login-box button {
  width: 100%;
  margin-top: 20px;
  padding: 14px;
  border: none;
  border-radius: 12px;
  background: linear-gradient(90deg, #0EA5E9, #6D28D9);
  color: white;
}

/* ADMIN */
.layout {
  display: none;
  height: 100vh;
}

.sidebar {
  width: 260px;
  background: #07101F;
  color: white;
  padding: 25px;
  display: flex;
  flex-direction: column;
}

.sidebar img {
  width: 70px;
  border-radius: 50%;
}

.sidebar button {
  margin-top: 10px;
  padding: 12px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
}

.main {
  flex: 1;
  padding: 30px;
}

/* DASHBOARD */
.cards {
  display: grid;
  grid-template-columns: repeat(4,1fr);
  gap: 20px;
}

.card-metric {
  background: white;
  padding: 20px;
  border-radius: 18px;
}

.lista {
  background: white;
  margin-top: 20px;
  padding: 20px;
  border-radius: 18px;
}

.item {
  display: flex;
  justify-content: space-between;
  padding: 10px 0;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login" class="login-screen">

  <div class="login-left">
    <img src="logo-vertical.png" class="logo-vertical">
    <h1>DIÁRIO LUNAR</h1>
    <p>Painel administrativo</p>
  </div>

  <div class="login-right">
    <div class="login-box">
      <h2>Entrar</h2>
      <input id="email" placeholder="Email">
      <input id="senha" type="password" placeholder="Senha">
      <button onclick="logar()">Entrar</button>
    </div>
  </div>

</div>

<!-- PAINEL -->
<div id="layout" class="layout">

  <div class="sidebar">
    <div onclick="window.location.href='/'">← Voltar</div>

    <img id="foto">
    <h3 id="nome"></h3>
    <p id="user"></p>
    <small id="nomenclatura"></small>

    <button onclick="dashboard()">Painel</button>
    <button onclick="novaMateria()">Nova Matéria</button>
    <button onclick="listar()">Matérias</button>
    <button onclick="editarPerfil()">Perfil</button>
    <button id="btnCadastrar" onclick="cadastrarADM()" style="display:none;">Novo ADM</button>
    <button onclick="sair()">Sair</button>
  </div>

  <div class="main" id="conteudo"></div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";
import { getFirestore, doc, getDoc, collection, addDoc, getDocs, deleteDoc, updateDoc } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

const app = initializeApp({
  apiKey:"AIzaSy...",
  authDomain:"diario-lunar-dee91.firebaseapp.com",
  projectId:"diario-lunar-dee91"
});

const auth = getAuth(app);
const db = getFirestore(app);

let uid, perfil, editId;

window.logar = async () => {
  await signInWithEmailAndPassword(auth,email.value,senha.value);
};

onAuthStateChanged(auth, async (u)=>{
  if(!u) return;

  uid = u.uid;

  const snap = await getDoc(doc(db,"admins",uid));

  if(!snap.exists()){
    alert("Sem acesso");
    signOut(auth);
    return;
  }

  perfil = snap.data();

  login.style.display="none";
  layout.style.display="flex";

  nome.innerText=perfil.nome;
  user.innerText="@"+perfil.user;
  nomenclatura.innerText=perfil.nomenclatura;

  if(perfil.role==="superadmin") btnCadastrar.style.display="block";

  dashboard();
});

window.sair = async ()=>{
  await signOut(auth);
  login.style.display="flex";
  layout.style.display="none";
};

window.dashboard = async ()=>{
  const snap = await getDocs(collection(db,"posts"));

  let lista="";

  snap.forEach(d=>{
    lista+=`<div class="item">
      <span>${d.data().titulo}</span>
      <span>Publicado</span>
    </div>`;
  });

  conteudo.innerHTML=`
    <h1>Painel</h1>

    <div class="cards">
      <div class="card-metric">Matérias<br><h2>${snap.size}</h2></div>
      <div class="card-metric">Views<br><h2>---</h2></div>
      <div class="card-metric">Comentários<br><h2>---</h2></div>
      <div class="card-metric">Este mês<br><h2>${snap.size}</h2></div>
    </div>

    <div class="lista">
      <h2>Últimas matérias</h2>
      ${lista}
    </div>
  `;
};

window.novaMateria = ()=>{
  conteudo.innerHTML=`
    <h1>Nova Matéria</h1>
    <input id="titulo">
    <textarea id="conteudoTxt"></textarea>
    <button onclick="salvar()">Salvar</button>
  `;
};

window.salvar = async ()=>{
  await addDoc(collection(db,"posts"),{
    titulo:titulo.value,
    conteudo:conteudoTxt.value,
    autor:perfil.user,
    data:new Date()
  });
  listar();
};

window.listar = async ()=>{
  const snap = await getDocs(collection(db,"posts"));

  let html="";

  snap.forEach(d=>{
    html+=`
    <div>
      ${d.data().titulo}
      <button onclick="excluir('${d.id}')">X</button>
    </div>`;
  });

  conteudo.innerHTML=html;
};

window.excluir = async(id)=>{
  await deleteDoc(doc(db,"posts",id));
  listar();
};

window.editarPerfil = ()=>{
  conteudo.innerHTML=`
    <input id="nomeNovo" value="${perfil.nome}">
    <button onclick="salvarPerfil()">Salvar</button>
  `;
};

window.salvarPerfil = async ()=>{
  await updateDoc(doc(db,"admins",uid),{
    nome:nomeNovo.value
  });
  location.reload();
};

window.cadastrarADM = ()=>{
  conteudo.innerHTML=`Novo ADM`;
};
</script>

</body>
</html>
